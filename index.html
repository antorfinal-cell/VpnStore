<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium VPN Store</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        
        body { 
            background-color: #0a0b10; 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .cyber-card { 
            background: rgba(30, 41, 59, 0.7); 
            border: 1px solid rgba(0, 242, 255, 0.3); 
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.05); 
            backdrop-filter: blur(12px);
            border-radius: 24px;
        }

        .accent-text { 
            color: #00f2ff; 
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); 
        }

        /* Smooth animation for list items */
        .fade-in {
            animation: fadeIn 0.5s ease-in forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buy Button Pulse */
        .buy-btn {
            background: #00f2ff;
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }
    </style>
</head>
<body class="p-4 pb-10">
    <!-- Header Section -->
    <header class="text-center mb-8 mt-4">
        <h1 class="text-4xl font-black accent-text uppercase italic tracking-tighter">Premium VPN</h1>
        <div class="flex justify-center items-center gap-2 mt-2">
            <span class="h-[1px] w-8 bg-cyan-900"></span>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em]">High-Speed Servers 🌐</p>
            <span class="h-[1px] w-8 bg-cyan-900"></span>
        </div>
    </header>

    <!-- Status/Loading -->
    <div id="loading" class="flex flex-col items-center justify-center py-20">
        <div class="w-10 h-10 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-cyan-500 text-xs font-bold uppercase tracking-widest">Encrypting Connection...</p>
    </div>

    <!-- Package List -->
    <div id="user-list" class="space-y-4"></div>

    <script>
        // Initialize Telegram WebApp
        const tele = window.Telegram.WebApp;
        tele.expand(); // Full screen mode
        tele.ready();
        
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDc0TObz5Juqw3RodyuytqzbTX2rH77rRc",
            authDomain: "vpn-store-bd88d.firebaseapp.com",
            databaseURL: "https://vpn-store-bd88d-default-rtdb.firebaseio.com",
            projectId: "vpn-store-bd88d",
            storageBucket: "vpn-store-bd88d.firebasestorage.app",
            messagingSenderId: "107206065128",
            appId: "1:107206065128:web:638337b3ca0c05de89825d",
            measurementId: "G-HF3FT7437B"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Load Data from Firebase
        db.ref('vpn_offers').on('value', (snapshot) => {
            const loading = document.getElementById('loading');
            if(loading) loading.style.display = 'none';
            
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            const data = snapshot.val();
            
            if(!data) {
                list.innerHTML = '<p class="text-center text-gray-600 py-10">No active offers. Check back later! 🌸</p>';
                return;
            }

            for (let id in data) {
                const pkg = data[id];
                list.innerHTML += `
                    <div class="cyber-card p-5 flex justify-between items-center fade-in border-l-4 border-l-[#00f2ff]">
                        <div>
                            <h3 class="text-xl font-black text-white italic tracking-tight">${pkg.name}</h3>
                            <div class="flex items-center gap-1 mt-1">
                                <span class="text-[10px] bg-cyan-950 text-cyan-400 px-2 py-0.5 rounded-md font-bold uppercase tracking-tighter italic">Valid for ${pkg.duration}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="accent-text font-black text-2xl tracking-tighter">${pkg.price} 💸</p>
                            <button onclick="handleBuy()" class="buy-btn mt-3 px-6 py-2 rounded-xl font-black text-[11px] uppercase tracking-wider active:scale-90 transition-all">
                                Buy Now
                            </button>
                        </div>
                    </div>
                `;
            }
        });

        // Handle Purchase via Telegram Inbox
        function handleBuy() {
            tele.HapticFeedback.impactOccurred('medium'); // Vibration feedback
            window.open('https://t.me/mrantor07', '_blank');
        }
    </script>
</body>
</html>
